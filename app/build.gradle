plugins {
    id 'com.android.application'
}

android {
    namespace 'com.remutx.youtube'
    compileSdk 34

    defaultConfig {
        applicationId "com.remutx.youtube"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No extra dependencies needed — pure Android WebView
}
